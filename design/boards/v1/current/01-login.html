<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>01 로그인 (Phase 4c)</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;0,6..72,600;1,6..72,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="shared.css">
  <style>
    /* 01 고유: 단일 컬럼 진입 화면 — shared.css 토큰 재사용, 본문 스케일만 13px로 오버라이드 */
    body {
      font-size: 13px; line-height: 1.5;
    }

    .stage {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 40px 20px;
    }
    .login {
      width: 340px;
      display: grid;
      justify-items: center;
      text-align: center;
      gap: 0;
    }
    .brand-mark {
      width: 44px; height: 44px; border-radius: 10px;
      display: grid; place-items: center;
      background: var(--teal); color: var(--on-color);
      font-family: var(--font-serif); font-size: 20px; font-weight: 600; font-style: italic;
    }
    h1 { margin: 16px 0 0; color: var(--ink); font-family: var(--font-serif); font-size: 24px; font-weight: 500; letter-spacing: -0.01em; }
    .tagline { margin: 8px 0 0; color: var(--muted); font-size: 13px; }

    .google-btn {
      margin-top: 32px;
      width: 100%;
      min-height: 44px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--bg);
      color: var(--ink);
      font-size: 14px;
      font-weight: 700;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      transition: background-color var(--motion) var(--easing);
    }
    .google-btn:hover { background: var(--hover-ink); }
    .google-btn svg { width: 18px; height: 18px; flex: 0 0 auto; }

    .quiet-note { margin-top: 18px; color: var(--muted); font-size: 12px; }
  </style>
</head>
<body>
  <main class="stage">
    <div class="login">
      <span class="brand-mark" aria-hidden="true">M</span>
      <h1>Maily</h1>
      <p class="tagline">여러 Gmail 계정의 중요한 메일을 선별해 브리핑합니다.</p>

      <button class="google-btn" type="button">
        <svg viewBox="0 0 48 48" aria-hidden="true">
          <path fill="#EA4335" d="M24 9.5c3.5 0 6.6 1.2 9.1 3.6l6.8-6.8C35.7 2.4 30.2 0 24 0 14.6 0 6.5 5.4 2.6 13.2l7.9 6.2C12.4 13.4 17.7 9.5 24 9.5z"></path>
          <path fill="#4285F4" d="M46.5 24.5c0-1.6-.1-3.1-.4-4.5H24v9h12.7c-.6 3-2.3 5.5-4.8 7.2l7.7 6c4.5-4.2 6.9-10.4 6.9-17.7z"></path>
          <path fill="#FBBC05" d="M10.5 28.6c-.5-1.5-.8-3-.8-4.6s.3-3.1.8-4.6l-7.9-6.2C.9 16.5 0 20.1 0 24s.9 7.5 2.6 10.8l7.9-6.2z"></path>
          <path fill="#34A853" d="M24 48c6.2 0 11.4-2 15.2-5.6l-7.7-6c-2.1 1.4-4.7 2.3-7.5 2.3-6.3 0-11.6-3.9-13.5-9.3l-7.9 6.2C6.5 42.6 14.6 48 24 48z"></path>
        </svg>
        Google로 로그인하기
      </button>

      <p class="quiet-note">원문 확인·답장·발송은 계속 Gmail에서 합니다.</p>
    </div>
  </main>
</body>
</html>
