services:
  postgres:
    image: postgres:18.4-alpine
    environment:
      POSTGRES_DB: maily
      POSTGRES_USER: maily
      POSTGRES_PASSWORD: maily
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U maily -d maily"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:8.8-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
  redis-data:
